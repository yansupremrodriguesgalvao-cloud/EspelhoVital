<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Registro de Sono</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="container">

    <a class="voltar" href="../index.html">⬅ Voltar</a>

    <div class="form-card">

        <h2>😴 Registro de Sono</h2>

        <input 
            type="number" 
            id="horas" 
            placeholder="Horas dormidas (ex: 7.5)"
            min="0"
            max="24"
            step="0.1"
        >

        <select id="qualidade">
            <option value="">🤖 Deixar a IA decidir</option>
            <option value="Excelente">🌟 Excelente</option>
            <option value="Boa">😊 Boa</option>
            <option value="Regular">😐 Regular</option>
            <option value="Ruim">😴 Ruim</option>
        </select>

        <button onclick="salvarSono()">Salvar registro</button>

        <p id="feedback" style="margin-top:10px; font-size:14px;"></p>

    </div>

</div>

<script src="../js/script.js"></script>

</body>
</html>
