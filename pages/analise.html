<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Sono</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="container">

    <a href="../index.html" class="voltar">
        ⬅ Voltar ao Dashboard
    </a>

    <div class="form-card">

        <h2>📊 Análise dos Registros</h2>

        <div class="dashboard">

            <div class="card">
                <h2 id="mediaSono">0</h2>
                <p>Média de Sono</p>
            </div>

            <div class="card">
                <h2 id="totalRegistros">0</h2>
                <p>Total de Registros</p>
            </div>

            <div class="card">
                <h2 id="statusSono">--</h2>
                <p>Status Geral</p>
            </div>

        </div>

        <div class="form-card ai-box">
            <h3>🧠 Análise Inteligente</h3>
            <p id="iaAnalise">Carregando análise...</p>
        </div>

    </div>

</div>

<script>

function avaliarSono(media) {

    if (media < 6) return "🔴 Crítico";
    if (media < 7) return "🟡 Abaixo do ideal";
    if (media <= 8.5) return "🟢 Saudável";
    return "⚠️ Excesso de sono";
}

function gerarAnalise(media, total) {

    if (total === 0) {
        return "Nenhum dado registrado ainda.";
    }

    if (media < 6) {
        return "Seu padrão indica sono insuficiente. Isso pode afetar foco, humor e energia.";
    }

    if (media <= 8.5) {
        return "Seu sono está dentro do padrão saudável. Continue mantendo consistência.";
    }

    return "Você está dormindo bastante. Verifique rotina e qualidade do descanso.";
}

async function carregarAnalise() {

    try {

        const res = await fetch("http://localhost:8081/sono");
        const registros = await res.json();

        const total = registros.length;

        const media = total > 0
            ? (registros.reduce((s, i) => s + i.horas, 0) / total).toFixed(1)
            : 0;

        const status = avaliarSono(media);

        const analise = gerarAnalise(media, total);

        // UI
        document.getElementById("mediaSono").textContent = media + "h";
        document.getElementById("totalRegistros").textContent = total;
        document.getElementById("statusSono").textContent = status;
        document.getElementById("iaAnalise").textContent = analise;

    } catch (erro) {
        console.error("Erro análise:", erro);
    }
}

carregarAnalise();

</script>

</body>
</html>
